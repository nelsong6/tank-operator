name: Build mcp-github image

on:
  push:
    branches: [main]
    paths:
      - 'mcp-servers/github/**'
      - '.github/workflows/mcp-github-build.yml'
  workflow_dispatch:

concurrency:
  group: mcp-github-build
  cancel-in-progress: true

permissions:
  id-token: write
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Azure login (mcp-github CI SP)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.MCP_GITHUB_CI_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name romainecr

      - name: Compute tag
        id: tag
        run: echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build + push (SHA-pinned, no :latest)
        working-directory: mcp-servers/github
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          docker build \
            -t romainecr.azurecr.io/mcp-github:$TAG .
          docker push romainecr.azurecr.io/mcp-github:$TAG
          echo "### Pushed romainecr.azurecr.io/mcp-github:$TAG" >> $GITHUB_STEP_SUMMARY

      - name: Bump mcp-github chart
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          # Quote the value so all-digit short-SHAs aren't parsed as YAML numbers
          # and emitted in scientific notation. Same trap as the tank-operator
          # chart; see reference_yaml_tag_quoting.md.
          sed -i -E "s|^(  tag: ).*$|\1\"${tag}\"|" k8s-mcp-github/values.yaml

          if git diff --quiet k8s-mcp-github/values.yaml; then
            echo "no tag change"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s-mcp-github/values.yaml
          git commit -m "chart: bump mcp-github image to ${tag} [skip ci]"
          # Concurrent builds can leave us non-fast-forward. Rebase-retry.
          for i in 1 2 3; do
            if git push; then exit 0; fi
            git pull --rebase origin main
          done
          git push
