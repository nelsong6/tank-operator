name: Build issue-agent-runner image

on:
  push:
    branches: [main]
    paths:
      - 'runner/**'
      - '.github/workflows/issue-agent-runner-build.yml'
  workflow_dispatch:

concurrency:
  group: issue-agent-runner-build
  cancel-in-progress: true

permissions:
  id-token: write
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name romainecr

      - name: Compute tag
        id: tag
        run: echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build + push (SHA-pinned, no :latest)
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          docker build -f runner/Dockerfile \
            -t romainecr.azurecr.io/tank-operator-issue-agent-runner:$TAG runner
          docker push romainecr.azurecr.io/tank-operator-issue-agent-runner:$TAG
          echo "### Pushed romainecr.azurecr.io/tank-operator-issue-agent-runner:$TAG" >> $GITHUB_STEP_SUMMARY

      - name: Bump runner image tag in k8s-arc-runners chart
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          # Single repo:tag string in values.yaml under
          # gha-runner-scale-set.template.spec.containers[0].image.
          sed -i -E "s|^(\s*image: romainecr.azurecr.io/tank-operator-issue-agent-runner:).*$|\1${tag}|" k8s-arc-runners/values.yaml

          if git diff --quiet k8s-arc-runners/values.yaml; then
            echo "no tag change"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s-arc-runners/values.yaml
          git commit -m "chart: bump issue-agent-runner image to ${tag} [skip ci]"
          for i in 1 2 3; do
            if git push; then exit 0; fi
            git pull --rebase origin main
          done
          git push
