name: Build api-proxy image

on:
  push:
    branches: [main]
    paths:
      - 'api-proxy/**'
      - '.github/workflows/api-proxy-build.yml'
  workflow_dispatch:

concurrency:
  group: api-proxy-build
  cancel-in-progress: true

permissions:
  id-token: write
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Azure login (api-proxy CI SP)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.API_PROXY_CI_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name romainecr

      - name: Compute tag
        id: tag
        run: echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build + push (SHA-pinned, no :latest)
        working-directory: api-proxy
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          docker build \
            -t romainecr.azurecr.io/api-proxy:$TAG .
          docker push romainecr.azurecr.io/api-proxy:$TAG
          echo "### Pushed romainecr.azurecr.io/api-proxy:$TAG" >> $GITHUB_STEP_SUMMARY

      - name: Bump api-proxy chart tag
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          # Quote the value so all-digit short-SHAs aren't parsed as YAML
          # numbers and emitted in scientific notation. See
          # reference_yaml_tag_quoting.md.
          sed -i -E "s|^(    tag: ).*$|\1\"${tag}\"|" k8s/values.yaml

          if git diff --quiet k8s/values.yaml; then
            echo "no tag change"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/values.yaml
          git commit -m "chart: bump api-proxy image to ${tag} [skip ci]"
          for i in 1 2 3; do
            if git push; then exit 0; fi
            git pull --rebase origin main
          done
          git push
