# SA used by both containers. kube-rbac-proxy uses this SA's token to call
# TokenReview on incoming bearer tokens (granted via the system:auth-delegator
# binding in templates/auth-delegator.yaml). The same SA is what the upstream
# Python process uses for its outbound kubectl/helm calls — its read-only
# ClusterRoleBinding is in templates/cluster-reader.yaml.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-k8s
  namespace: mcp-k8s
