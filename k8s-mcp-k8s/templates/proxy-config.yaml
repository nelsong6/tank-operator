# Same pattern as mcp-github / mcp-azure: synthetic resource
# (mcp.tank-operator.io/servers named "k8s") gates SubjectAccessReview,
# ClusterRole + RoleBinding names allowed callers explicitly.
apiVersion: v1
kind: ConfigMap
metadata:
  name: kube-rbac-proxy
  namespace: mcp-k8s
data:
  config.yaml: |
    authorization:
      resourceAttributes:
        apiGroup: mcp.tank-operator.io
        resource: servers
        name: k8s
        namespace: mcp-k8s
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mcp-k8s-invoker
rules:
  - apiGroups: ["mcp.tank-operator.io"]
    resources: ["servers"]
    resourceNames: ["k8s"]
    # GET (SSE) + POST (JSON-RPC) — kube-rbac-proxy auto-derives the
    # verb from the HTTP method.
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mcp-k8s-invoker
  namespace: mcp-k8s
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mcp-k8s-invoker
subjects:
  - kind: ServiceAccount
    name: claude-session
    namespace: tank-operator-sessions
