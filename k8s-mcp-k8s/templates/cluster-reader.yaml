# Cluster-wide read for the server SA. kubectl/helm running inside the pod
# authenticate as this SA; allowlists in mcp_k8s/tools.py prevent mutating
# verbs at the tool layer. RBAC here is the second line of defense — even
# if the allowlist were bypassed, the SA can't write anything.
#
# `view` ClusterRole excludes secrets, which would break helm list (helm
# stores release state as a Secret). So a custom rule that mirrors `view`
# semantics but covers everything via the wildcard.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mcp-k8s-reader
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["*"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mcp-k8s-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mcp-k8s-reader
subjects:
  - kind: ServiceAccount
    name: mcp-k8s
    namespace: mcp-k8s
