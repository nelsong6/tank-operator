# Cluster-admin-equivalent RBAC for the server SA. kubectl/helm running
# inside the pod authenticate as this SA; whatever tools mcp_k8s/tools.py
# exposes, this binding is permissive enough to back them.
#
# This is a deliberate design shift away from the prior read-mostly model.
# The tool allowlist in mcp_k8s/tools.py is now the *only* layer scoping
# what an agent can do — RBAC no longer functions as a second line of
# defense. Trade-off: a bug in the tool layer is sufficient to mutate or
# delete arbitrary cluster state.
#
# Note: the ClusterRole/Binding name (mcp-k8s-reader) and the file name
# (cluster-reader.yaml) are now misleading. Left unchanged here to keep
# this commit minimal; rename in a follow-up.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mcp-k8s-reader
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
  - nonResourceURLs: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mcp-k8s-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mcp-k8s-reader
subjects:
  - kind: ServiceAccount
    name: mcp-k8s
    namespace: mcp-k8s
