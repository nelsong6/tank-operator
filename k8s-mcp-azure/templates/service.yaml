# ClusterIP only — MCP servers are reachable from inside the cluster (e.g.
# tank-operator session pods) and never directly from the internet.
apiVersion: v1
kind: Service
metadata:
  name: mcp-azure
  namespace: mcp-azure
spec:
  type: ClusterIP
  selector:
    app: mcp-azure
  ports:
    - name: http
      port: 80
      targetPort: proxy
