# Syncs the UAMI client ID and tenant ID from Key Vault into env vars the
# pod consumes via envFrom. AZURE_CLIENT_ID + AZURE_TENANT_ID +
# AZURE_FEDERATED_TOKEN_FILE + AZURE_AUTHORITY_HOST is the full set
# DefaultAzureCredential needs for workload-identity auth — the latter two
# come from the pod env directly (token file mounted by the WI webhook).
#
# Verbose remoteRef blocks aren't optional: ESO defaults them at admission,
# and ArgoCD's server-side diff sees the defaulted live state as drift and
# self-heals in a loop unless we spell them out here.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mcp-azure-config
  namespace: mcp-azure
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: romaine-kv
    kind: ClusterSecretStore
  target:
    name: mcp-azure-config
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: AZURE_CLIENT_ID
      remoteRef:
        key: mcp-azure-mi-client-id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: AZURE_TENANT_ID
      remoteRef:
        key: mcp-tenant-id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
