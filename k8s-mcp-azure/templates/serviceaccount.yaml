# SA used by both containers. The kube-rbac-proxy sidecar uses this SA's
# token to call the K8s API's TokenReview endpoint — granted via the
# system:auth-delegator ClusterRoleBinding in templates/.
#
# AZURE_CLIENT_ID is provided via envFrom from the ExternalSecret rather
# than via the azure.workload.identity/client-id annotation here — the
# webhook only injects when the SA is annotated, and the ESO pattern keeps
# the UAMI ID rotatable in one place. Token projection still happens
# because the pod carries the azure.workload.identity/use="true" label.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-azure
  namespace: mcp-azure
