{{- /*
Credential refresh CronJob — singleton writer of the Anthropic OAuth
credentials in Key Vault. Runs the refresh_credentials.py entrypoint in
the same image as the orchestrator (different command), so there's no
second image to build.

Why a CronJob instead of in-process refresh: Anthropic rotates the
refresh token on every use, and ESO treats KV as the source of truth.
An in-process writer in the orchestrator (any replica count) would
race against ESO reconciliation and silently lose rotations. Splitting
the writer (this CronJob, singleton) from the readers (orchestrator
replicas, stateless) makes the data flow one-way:
  this CronJob → KV → ExternalSecret → K8s Secret → orchestrator file mount

concurrencyPolicy: Forbid is load-bearing. Two concurrent refreshes
would both attempt to use the same refresh token; the loser's call
returns 400 invalid_grant and Anthropic invalidates the winner's
rotation as a side effect of detecting reuse. Don't relax this.

Schedule cadence: must be < access-token TTL (typically 1h on Anthropic).
30m gives one retry buffer if a single run fails before sessions start
booting with expired tokens.
*/}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.credentialRefresher.serviceAccount }}
  namespace: {{ .Values.namespaces.orchestrator }}
  # No azure.workload.identity/client-id annotation here — same pattern
  # as k8s-mcp-azure: the federated-credential subject in Azure ties
  # this SA to the UAMI server-side, the WI webhook mounts the token
  # file because of the pod label, and AZURE_CLIENT_ID is supplied via
  # envFrom from the ExternalSecret below. Keeps the UAMI ID rotatable
  # in one place (Terraform → KV → ESO) instead of duplicated in chart
  # values.
---
{{- /*
Sync the refresher UAMI's client/tenant IDs from KV into env vars the
CronJob's pod consumes via envFrom. AZURE_CLIENT_ID +
AZURE_TENANT_ID + AZURE_FEDERATED_TOKEN_FILE + AZURE_AUTHORITY_HOST is
the full set DefaultAzureCredential needs for workload-identity auth;
the latter two come from the pod env directly (token file mounted by
the WI webhook).
*/}}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.credentialRefresher.configSecret }}
  namespace: {{ .Values.namespaces.orchestrator }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecret.storeName }}
    kind: {{ .Values.externalSecret.storeKind }}
  target:
    name: {{ .Values.credentialRefresher.configSecret }}
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: AZURE_CLIENT_ID
      remoteRef:
        key: {{ .Values.credentialRefresher.kvClientIdKey }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: AZURE_TENANT_ID
      remoteRef:
        key: {{ .Values.credentialRefresher.kvTenantIdKey }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Values.credentialRefresher.name }}
  namespace: {{ .Values.namespaces.orchestrator }}
spec:
  schedule: {{ .Values.credentialRefresher.schedule | quote }}
  # Forbid: never run two refreshes at once; see header comment for why.
  concurrencyPolicy: Forbid
  # Skip a missed run if the previous one was still going at the next
  # tick — better to retry on the next clean window than to queue runs.
  startingDeadlineSeconds: 60
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0  # don't retry within the Job; let next CronJob tick handle it
      template:
        metadata:
          labels:
            app.kubernetes.io/name: {{ .Values.credentialRefresher.name }}
            azure.workload.identity/use: "true"
        spec:
          serviceAccountName: {{ .Values.credentialRefresher.serviceAccount }}
          restartPolicy: Never
          containers:
            - name: refresh
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command:
                - python
                - -m
                - tank_operator.refresh_credentials
              env:
                - name: AZURE_KEYVAULT_URL
                  value: {{ .Values.credentialRefresher.keyVaultUrl | quote }}
                - name: CLAUDE_CREDENTIALS_KV_KEY
                  value: {{ .Values.externalSecret.claudeCredentials.kvKey | quote }}
                # Path the WI webhook projects the federated SA token to.
                # AZURE_CLIENT_ID + AZURE_TENANT_ID arrive via envFrom.
                - name: AZURE_FEDERATED_TOKEN_FILE
                  value: /var/run/secrets/azure/tokens/azure-identity-token
                - name: AZURE_AUTHORITY_HOST
                  value: https://login.microsoftonline.com/
              envFrom:
                - secretRef:
                    name: {{ .Values.credentialRefresher.configSecret }}
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 256Mi
