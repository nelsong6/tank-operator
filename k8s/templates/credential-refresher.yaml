{{- /*
Workload-identity config for the orchestrator's KV writer path.

The orchestrator runs Anthropic credential rotation in-process while
sessions exist (see backend/src/tank_operator/sessions.py +
refresh_credentials.py). When the last session is deleted, rotation
stops; when the first session arrives, the orchestrator does an
immediate refresh and starts a periodic timer. So idle clusters do zero
rotations, busy clusters get refreshes on the configured interval.

The orchestrator authenticates to KV as the `claude-credentials-refresher`
UAMI (see infra/credential_refresher.tf), which has Key Vault Secrets
Officer on the romaine-kv vault. The federated identity credential maps
the orchestrator SA → that UAMI. AZURE_CLIENT_ID + AZURE_TENANT_ID
arrive in the orchestrator pod via envFrom from the Secret defined
below, synced from KV by ESO.

(Naming hangover: the file and Secret are still called "refresher" from
the prior CronJob design. The CronJob is gone but the UAMI it created
is reused as-is — the name is correct in spirit, just no longer points
at a single workload.)
*/}}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.credentialRefresher.configSecret }}
  namespace: {{ .Values.namespaces.orchestrator }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecret.storeName }}
    kind: {{ .Values.externalSecret.storeKind }}
  target:
    name: {{ .Values.credentialRefresher.configSecret }}
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: AZURE_CLIENT_ID
      remoteRef:
        key: {{ .Values.credentialRefresher.kvClientIdKey }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: AZURE_TENANT_ID
      remoteRef:
        key: {{ .Values.credentialRefresher.kvTenantIdKey }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
