{{- /*
Anthropic credential rotation: a CronJob that calls platform.claude.com's
token endpoint with the current refresh token, writes the rotated blob
back to KV, and exits. ESO then mirrors KV → the orchestrator's mounted
Secret within ~1m so the OAuth gateway picks up the new access token.

Why a CronJob and not the orchestrator's main process: the rotation
window between Anthropic returning 200 and our KV write completing is
~1s, but Anthropic has already invalidated the old refresh token in
that window. If anything kills the rotator mid-flight, the chain dies
permanently and the user has to re-seed via "+ config sub". Putting
rotation on the orchestrator pod meant every chart bump (multiple per
day during active development) was a chance to lose the rotated token.
A CronJob's pod lifetime equals one rotation, so the only way to lose
a rotation now is the kubelet killing the cron pod itself — much rarer.

Idle-skip: the entrypoint (tank_operator.cron_refresh) lists Deployments
in the sessions namespace before calling Anthropic and exits 0 if none
exist. So idle clusters still do zero rotations; we keep that property
without coupling to the orchestrator pod's lifecycle.

concurrencyPolicy: Forbid because two rotations against Anthropic in
parallel would race each other to invalidate the refresh token —
whichever response loses the KV write is gone forever.

The CronJob runs as the same SA as the orchestrator: the orchestrator
SA already has the sessions-ns RBAC needed for the idle check and is
already wired into the same ESO Secret that provides AZURE_CLIENT_ID +
AZURE_TENANT_ID for KV writes.
*/}}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: tank-operator-credential-refresher
  namespace: {{ .Values.namespaces.orchestrator }}
spec:
  schedule: {{ .Values.credentialRefresher.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 120
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        metadata:
          labels:
            app.kubernetes.io/name: tank-operator-credential-refresher
            azure.workload.identity/use: "true"
        spec:
          serviceAccountName: {{ .Values.orchestrator.serviceAccount }}
          restartPolicy: Never
          containers:
            - name: refresh
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command: ["python", "-m", "tank_operator.cron_refresh"]
              env:
                - name: SESSIONS_NAMESPACE
                  value: {{ .Values.namespaces.sessions | quote }}
                - name: AZURE_KEYVAULT_URL
                  value: {{ .Values.credentialRefresher.keyVaultUrl | quote }}
                - name: CLAUDE_CREDENTIALS_KV_KEY
                  value: {{ .Values.externalSecret.claudeCredentials.kvKey | quote }}
                - name: AZURE_FEDERATED_TOKEN_FILE
                  value: /var/run/secrets/azure/tokens/azure-identity-token
                - name: AZURE_AUTHORITY_HOST
                  value: https://login.microsoftonline.com/
              envFrom:
                - secretRef:
                    name: {{ .Values.credentialRefresher.configSecret }}
---
{{- /*
ESO-synced Secret carrying AZURE_CLIENT_ID + AZURE_TENANT_ID for the
`claude-credentials-refresher` UAMI (see infra/credential_refresher.tf).
DefaultAzureCredential in both the orchestrator (for save-credentials)
and the CronJob (for periodic rotation) picks this up via envFrom plus
the WI webhook's projected token file to mint a federated KV token.
*/}}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.credentialRefresher.configSecret }}
  namespace: {{ .Values.namespaces.orchestrator }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecret.storeName }}
    kind: {{ .Values.externalSecret.storeKind }}
  target:
    name: {{ .Values.credentialRefresher.configSecret }}
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: AZURE_CLIENT_ID
      remoteRef:
        key: {{ .Values.credentialRefresher.kvClientIdKey }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: AZURE_TENANT_ID
      remoteRef:
        key: {{ .Values.credentialRefresher.kvTenantIdKey }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
