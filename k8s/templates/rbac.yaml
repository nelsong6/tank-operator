# Orchestrator (running as the `tank-operator` SA in the tank-operator ns) needs to manage
# Deployments and pods/exec in the sessions namespace. (Was Jobs; switched so ArgoCD's
# resource tree shows session pods richly and the workload semantics are correct —
# long-running until killed, not batch.)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tank-operator-sessions-mgr
  namespace: {{ .Values.namespaces.sessions }}
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create", "get"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tank-operator-sessions-mgr
  namespace: {{ .Values.namespaces.sessions }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.orchestrator.serviceAccount }}
    namespace: {{ .Values.namespaces.orchestrator }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tank-operator-sessions-mgr
