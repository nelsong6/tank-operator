# Backend auth secrets — Entra app client-id (used as the JWT audience for
# verifying Entra ID tokens), the backend's own JWT signing secret, and the
# allowed-email gate. Written by infra/oauth_app.tf.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.externalSecret.auth.secretName }}
  namespace: {{ .Values.namespaces.orchestrator }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecret.storeName }}
    kind: {{ .Values.externalSecret.storeKind }}
  target:
    name: {{ .Values.externalSecret.auth.secretName }}
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    {{- range .Values.externalSecret.auth.keys }}
    - secretKey: {{ .envVar }}
      remoteRef:
        key: {{ .kvKey }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    {{- end }}
