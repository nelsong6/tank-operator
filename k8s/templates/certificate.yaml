apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.ingress.tlsSecret }}
  namespace: {{ .Values.namespaces.orchestrator }}
spec:
  secretName: {{ .Values.ingress.tlsSecret }}
  dnsNames:
    - {{ .Values.ingress.hostname }}
  issuerRef:
    name: {{ .Values.ingress.certIssuer }}
    kind: ClusterIssuer
