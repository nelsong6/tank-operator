# OAuth2 client credentials + cookie secret + allowed-email file. Pulled from
# romaine-kv (written by infra/oauth_app.tf) into a Secret in the orchestrator
# namespace so oauth2-proxy can envFrom it.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.externalSecret.oauth.secretName }}
  namespace: {{ .Values.namespaces.orchestrator }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecret.storeName }}
    kind: {{ .Values.externalSecret.storeKind }}
  target:
    name: {{ .Values.externalSecret.oauth.secretName }}
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    {{- range .Values.externalSecret.oauth.keys }}
    - secretKey: {{ .envVar }}
      remoteRef:
        key: {{ .kvKey }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    {{- end }}
