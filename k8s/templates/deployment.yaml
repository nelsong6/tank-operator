apiVersion: apps/v1
kind: Deployment
metadata:
  name: tank-operator
  namespace: {{ .Values.namespaces.orchestrator }}
  labels:
    app.kubernetes.io/name: tank-operator
spec:
  replicas: {{ .Values.orchestrator.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: tank-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tank-operator
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: {{ .Values.orchestrator.serviceAccount }}
      containers:
        - name: tank-operator
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
            - name: oauth-tls
              containerPort: 8443
          env:
            - name: SESSIONS_NAMESPACE
              value: {{ .Values.namespaces.sessions | quote }}
            - name: SESSION_IMAGE
              value: {{ .Values.session.image | quote }}
            - name: SESSION_SERVICE_ACCOUNT
              value: {{ .Values.session.serviceAccount | quote }}
            - name: GITHUB_APP_SECRET
              value: {{ .Values.externalSecret.githubApp.secretName | quote }}
            - name: IDLE_TIMEOUT_SECONDS
              value: {{ .Values.session.idleTimeoutSeconds | quote }}
            - name: REAPER_INTERVAL_SECONDS
              value: {{ .Values.session.reaperIntervalSeconds | quote }}
            - name: TANK_OPERATOR_STATIC_DIR
              value: /app/static
            - name: CLAUDE_CREDENTIALS_FILE
              value: /etc/claude-credentials/{{ .Values.externalSecret.claudeCredentials.secretKey }}
            - name: CLAUDE_OAUTH_GATEWAY_HOST
              value: {{ .Values.oauthGateway.serviceHost | quote }}
            - name: CLAUDE_API_PROXY_HOST
              value: {{ .Values.apiProxy.serviceHost | quote }}
            # Workload-identity wiring for the orchestrator's KV writes.
            # Used only by the break-glass save-credentials endpoint that
            # captures a logged-in blob from a config-mode pod. Steady-state
            # credential rotation lives in the api-proxy's ext_proc sidecar
            # (k8s/templates/api-proxy.yaml) — same UAMI, same env.
            #
            # Token file is mounted by the WI webhook because the pod
            # carries the `azure.workload.identity/use=true` label;
            # AZURE_CLIENT_ID + AZURE_TENANT_ID arrive via envFrom from
            # the ESO Secret that syncs the UAMI's client_id from KV.
            - name: AZURE_KEYVAULT_URL
              value: {{ .Values.credentialRefresher.keyVaultUrl | quote }}
            - name: CLAUDE_CREDENTIALS_KV_KEY
              value: {{ .Values.externalSecret.claudeCredentials.kvKey | quote }}
            - name: AZURE_FEDERATED_TOKEN_FILE
              value: /var/run/secrets/azure/tokens/azure-identity-token
            - name: AZURE_AUTHORITY_HOST
              value: https://login.microsoftonline.com/
          envFrom:
            - secretRef:
                name: {{ .Values.externalSecret.auth.secretName }}
            - secretRef:
                name: {{ .Values.credentialRefresher.configSecret }}
          volumeMounts:
            - name: oauth-gateway-tls
              mountPath: /etc/oauth-gateway-tls
              readOnly: true
            - name: claude-credentials
              mountPath: /etc/claude-credentials
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
      volumes:
        - name: oauth-gateway-tls
          secret:
            secretName: claude-oauth-leaf
            optional: true  # cert-manager hasn't issued yet on first install
        - name: claude-credentials
          secret:
            # ESO-managed; the orchestrator's in-process rotation writes
            # to KV and ESO mirrors KV → here within ~1m. Marked optional
            # so first install doesn't crash-loop the pod before ESO has
            # synced (or before "+ config sub" has seeded credentials).
            secretName: {{ .Values.externalSecret.claudeCredentials.secretName }}
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: tank-operator
  namespace: {{ .Values.namespaces.orchestrator }}
spec:
  selector:
    app.kubernetes.io/name: tank-operator
  ports:
    - name: http
      port: 80
      targetPort: http
