apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: tank-operator
  namespace: {{ .Values.namespaces.orchestrator }}
spec:
  parentRefs:
    - name: {{ .Values.ingress.gatewayName }}
      namespace: {{ .Values.ingress.gatewayNamespace }}
  hostnames:
    - {{ .Values.ingress.host | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: tank-operator
          port: 80
