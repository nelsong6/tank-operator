# Session SA used by ephemeral Job pods. Workload identity is enabled so sessions can use `az`
# via the federated identity attached to this SA (set up out-of-band per session-pod needs).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.session.serviceAccount }}
  namespace: {{ .Values.namespaces.sessions }}
  labels:
    azure.workload.identity/use: "true"
