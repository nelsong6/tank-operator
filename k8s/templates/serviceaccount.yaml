# Orchestrator SA. Annotated for Azure workload identity to match the per-app pattern
# (plant-agent, mcp-github, etc.); federation for this SA still needs to be added to the
# infra-bootstrap module.app, but the SA functions for in-cluster K8s API auth without it.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.orchestrator.serviceAccount }}
  namespace: {{ .Values.namespaces.orchestrator }}
  labels:
    azure.workload.identity/use: "true"
  annotations:
    azure.workload.identity/client-id: {{ .Values.orchestrator.workloadIdentityClientId | quote }}
---
# Session SA in sessions namespace. Used by ephemeral Job pods. Same workload-identity
# annotation so sessions can `az login` once federation is in place.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.session.serviceAccount }}
  namespace: {{ .Values.namespaces.sessions }}
  labels:
    azure.workload.identity/use: "true"
  annotations:
    azure.workload.identity/client-id: {{ .Values.orchestrator.workloadIdentityClientId | quote }}
