image:
  repository: romainecr.azurecr.io/tank-operator
  tag: latest
  pullPolicy: Always

namespaces:
  orchestrator: tank-operator
  sessions: tank-operator-sessions

orchestrator:
  serviceAccount: infra-shared
  # Client-id of the shared `infra-shared-identity` UAMI in the `infra` resource group.
  # Same UAMI used by plant-agent / house-hunt / etc.; federation for
  # `system:serviceaccount:tank-operator:infra-shared` is already provisioned by
  # infra-bootstrap module.app. (The `tank-operator` Entra app — 76161dab... — is
  # separate and only used for tofu/ACR push from CI.)
  workloadIdentityClientId: 44b0ff37-b886-4101-ab19-23388ead9c0b
  replicas: 1

session:
  image: romainecr.azurecr.io/claude-container:latest
  serviceAccount: claude-session
  ttlSecondsAfterFinished: 60

ingress:
  hostname: tank.romaine.life
  gatewayName: main
  gatewayNamespace: envoy-gateway-system
  certIssuer: letsencrypt-prod
  tlsSecret: tank-operator-tls

externalSecret:
  storeName: romaine-kv
  storeKind: ClusterSecretStore
  refreshInterval: 1h
  # Each entry maps a remote KV secret to an env var that the github MCP server
  # (running inside claude-container) reads. Same keys mcp-github uses.
  githubApp:
    secretName: github-app-creds
    keys:
      - envVar: GITHUB_APP_ID
        kvKey: github-app-id
      - envVar: GITHUB_APP_INSTALLATION_ID
        kvKey: github-app-installation-id
      - envVar: GITHUB_APP_PRIVATE_KEY
        kvKey: github-app-private-key
