image:
  repository: romainecr.azurecr.io/tank-operator
  tag: latest
  pullPolicy: Always

namespaces:
  orchestrator: tank-operator
  sessions: tank-operator-sessions

orchestrator:
  # Renamed from `infra-shared` to make explicit that this SA is *not* part of the
  # cluster's shared workload-identity pool — the orchestrator only needs in-cluster
  # K8s API auth (projected SA token + RoleBinding).
  serviceAccount: tank-operator
  replicas: 1

session:
  image: romainecr.azurecr.io/claude-container:latest
  serviceAccount: claude-session
  ttlSecondsAfterFinished: 60

ingress:
  hostname: tank.romaine.life
  gatewayName: main
  gatewayNamespace: envoy-gateway-system
  certIssuer: letsencrypt-prod
  tlsSecret: tank-operator-tls

externalSecret:
  storeName: romaine-kv
  storeKind: ClusterSecretStore
  refreshInterval: 1h
  # Each entry maps a remote KV secret to an env var that the github MCP server
  # (running inside claude-container) reads. Same keys mcp-github uses.
  githubApp:
    secretName: github-app-creds
    keys:
      - envVar: GITHUB_APP_ID
        kvKey: github-app-id
      - envVar: GITHUB_APP_INSTALLATION_ID
        kvKey: github-app-installation-id
      - envVar: GITHUB_APP_PRIVATE_KEY
        kvKey: github-app-private-key
  oauth:
    secretName: tank-operator-oauth
    # KV keys written by infra/oauth_app.tf; mapped onto OAUTH2_PROXY_* env vars below.
    keys:
      - envVar: OAUTH2_PROXY_CLIENT_ID
        kvKey: tank-operator-oauth-client-id
      - envVar: OAUTH2_PROXY_CLIENT_SECRET
        kvKey: tank-operator-oauth-client-secret
      - envVar: OAUTH2_PROXY_COOKIE_SECRET
        kvKey: tank-operator-oauth-cookie-secret
      - envVar: ALLOWED_EMAIL
        kvKey: tank-operator-oauth-allowed-email

oauth2Proxy:
  image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
  replicas: 1
  # Entra tenant — same one all the tofu work runs against.
  tenantId: 2236b5e4-81d2-4d82-bde5-17b1037999ea
