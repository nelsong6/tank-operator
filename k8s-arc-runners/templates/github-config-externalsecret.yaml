# Pulls the shared GitHub App credentials from Key Vault into the
# `arc-github-app` Secret shape that the gha-runner-scale-set subchart
# expects (see githubConfigSecret in values.yaml). The ARC controller reads
# these three keys to mint installation tokens for registering runners.
#
# Same KV keys (github-app-*) the org's other apps consume — this App is
# installed on nelsong6/* repos including tank-operator, so the controller
# can register runners against it. ambience created this Secret manually at
# bootstrap; templating it here closes that drift.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: arc-github-app
  namespace: arc-runners-tank-operator-issue-agents
spec:
  secretStoreRef:
    name: romaine-kv
    kind: ClusterSecretStore
  target:
    name: arc-github-app
    creationPolicy: Owner
  data:
    - secretKey: github_app_id
      remoteRef:
        key: github-app-id
    - secretKey: github_app_installation_id
      remoteRef:
        key: github-app-installation-id
    - secretKey: github_app_private_key
      remoteRef:
        key: github-app-private-key
