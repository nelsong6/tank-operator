# Pulls a GitHub PAT from Key Vault into the `arc-github-app` Secret shape
# the gha-runner-scale-set subchart expects (single `github_token` key; see
# githubConfigSecret in values.yaml). Matches ambience's working pattern —
# ambience hand-applied this secret at bootstrap; templating it here so the
# next project to onboard doesn't repeat that step.
#
# We use PAT (`github-pat` KV key) instead of the three-key GitHub-App
# triplet because the org's shared `github-app-*` KV secrets belong to the
# mcp-github App, which doesn't have the `administration:write` scope ARC
# needs to register runners. A dedicated runner-management App + tofu
# wiring would also work; the PAT path matches what's already in flight.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: arc-github-app
  namespace: arc-runners-tank-operator-issue-agents
spec:
  secretStoreRef:
    name: romaine-kv
    kind: ClusterSecretStore
  target:
    name: arc-github-app
    creationPolicy: Owner
  data:
    - secretKey: github_token
      remoteRef:
        key: github-pat
