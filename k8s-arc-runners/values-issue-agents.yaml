# AutoscalingRunnerSet values for tank-operator's issue-agent runners.
# Mirrors ambience/k8s/arc/values-issue-agents.yaml — same upstream chart
# (`gha-runner-scale-set`, controller in `arc-systems`), same shape.
#
# Install:
#   helm install tank-operator-issue-agents \
#     oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set \
#     --version 0.14.1 \
#     --namespace arc-runners-tank-operator-issue-agents \
#     --create-namespace \
#     -f k8s-arc-runners/values-issue-agents.yaml
#
# `runnerScaleSetName: tank-operator-issue-agents` becomes the `runs-on:`
# label that .github/workflows/issue-agent.yaml targets, AND the glimmung
# host name (must match exactly so glimmung's webhook → workflow_dispatch
# input.host maps to a real runner pool).
#
# `arc-github-app` is the existing org-wide GitHub App secret used by the
# ARC controller to mint runner registration tokens for nelsong6/* repos.

githubConfigUrl: "https://github.com/nelsong6/tank-operator"
githubConfigSecret: arc-github-app

maxRunners: 5
minRunners: 0

runnerScaleSetName: "tank-operator-issue-agents"

template:
  spec:
    containers:
      - name: runner
        # Use the upstream actions-runner image. The workflow installs
        # azure-cli + kubectl as needed via official actions
        # (azure/login@v2, azure/setup-kubectl@v4) — we don't need a
        # custom runner image for this flow.
        image: ghcr.io/actions/actions-runner:latest
        command:
          - /home/runner/run.sh
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
            ephemeral-storage: "2Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
            ephemeral-storage: "4Gi"
